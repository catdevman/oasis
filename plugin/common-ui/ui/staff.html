    <h1 class="text-3xl font-semibold mb-6 tracking-tight text-gray-800">Staff</h1>
    <table>
        <thead>
            <tr>
                <th>Identifier</th>
                <th>First Name</th>
                <th>Last Name</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{if .staffidentifier}}{{.staffidentifier}}{{else}}-{{end}}</td>
                <td>{{if .firstname}}{{.firstname}}{{else}}-{{end}}</td>
                <td>{{if .lastorsurname}}{{.lastorsurname}}{{else}}-{{end}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="3" class="text-center text-gray-500 italic py-8">No staff found.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
