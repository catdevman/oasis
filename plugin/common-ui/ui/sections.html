<div class="glass-panel">
    <h1 class="text-3xl font-semibold mb-6 tracking-tight">Course Sections</h1>
    <table>
        <thead>
            <tr>
                <th>Identifier</th>
                <th>Course Title</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{if .coursesectionidentifier}}{{.coursesectionidentifier}}{{else}}-{{end}}</td>
                <td>{{if .coursetitle}}{{.coursetitle}}{{else}}-{{end}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="2" class="text-center text-gray-500 italic py-8">No sections found.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
