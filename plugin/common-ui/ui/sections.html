<div class="glass-panel">
    <h1 class="page-title">Course Sections</h1>
    <table>
        <thead>
            <tr>
                <th>Section Identifier</th>
                <th>Course Title</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{if .coursesectionidentifier}}{{.coursesectionidentifier}}{{else}}-{{end}}</td>
                <td>{{if .coursetitle}}{{.coursetitle}}{{else}}-{{end}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="2" style="text-align: center; color: var(--text-muted);">No sections found.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
