    <h1 class="text-3xl font-semibold mb-6 tracking-tight text-gray-800">Schools</h1>
    <table>
        <thead>
            <tr>
                <th>Identifier</th>
                <th>Organization Name</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr>
                <td>{{if .organizationidentifier}}{{.organizationidentifier}}{{else}}-{{end}}</td>
                <td>{{if .organizationname}}{{.organizationname}}{{else}}-{{end}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="2" class="text-center text-gray-500 italic py-8">No schools found.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
